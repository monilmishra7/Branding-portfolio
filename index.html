<!--
  ============================================================
  HOW TO EDIT THIS FILE
  ============================================================
  Everything content-wise lives in the PROJECTS array near the
  top of the <script> at the bottom of this file. Each entry:

    {
      id, x, y,            -> position of the desktop icon (px)
      icon: 'url',          -> small thumbnail image on the desktop
      title, subtitle,      -> shown in the window header
      desc: 'text...',      -> the paragraph(s) of body copy
      type: 'A > B > C',    -> the "Details:" breadcrumb
      preview: 'url'         -> big image inside "Preview:"
    }

  Swap any icon/preview url for your own image file. Add or
  remove objects from the array to add/remove icons — nothing
  else needs to change, the desktop and windows build themselves.

  Desktop background image + dock are near the top of the CSS
  and in the .dock block in the HTML below.
  ============================================================
-->


</head>
